name: Release

on:
  push:
    tags:
      - "using-jj/jj-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to package and release (e.g. using-jj/jj-0.41.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: meta
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          SAFE="${TAG//\//-}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "safe=${SAFE}" >> "$GITHUB_OUTPUT"
          echo "Packaging tag: ${TAG} → dist/${SAFE}.zip"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - name: Pack skill zip
        run: |
          set -euo pipefail
          SAFE="${{ steps.meta.outputs.safe }}"
          mkdir -p dist
          # Current layout: skills/using-jj/; older tags: using-jj/ at repo root
          if [ -d skills/using-jj ]; then
            (cd skills && zip -r "../dist/${SAFE}.zip" using-jj)
          elif [ -d using-jj ]; then
            zip -r "dist/${SAFE}.zip" using-jj
          else
            echo "No using-jj skill directory found at skills/using-jj or using-jj" >&2
            ls -la
            exit 1
          fi
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          files: dist/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
