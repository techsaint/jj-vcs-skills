name: Release

on:
  push:
    tags:
      - "using-jj/jj-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to package and release (e.g. using-jj/jj-0.41.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: meta
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          SAFE="${TAG//\//-}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "safe=${SAFE}" >> "$GITHUB_OUTPUT"
          echo "Packaging tag: ${TAG} → dist/${SAFE}.zip"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - name: Pack skill zip
        run: |
          set -euo pipefail
          SAFE="${{ steps.meta.outputs.safe }}"
          mkdir -p dist
          # Install-shaped path: skills/using-jj/… (matches repo layout + README).
          # Older tags may still have using-jj/ at repo root — wrap into skills/.
          if [ -d skills/using-jj ]; then
            zip -r "dist/${SAFE}.zip" skills/using-jj
          elif [ -d using-jj ]; then
            mkdir -p dist/staging/skills
            cp -a using-jj dist/staging/skills/
            (cd dist/staging && zip -r "../${SAFE}.zip" skills/using-jj)
            rm -rf dist/staging
          else
            echo "No using-jj skill directory found at skills/using-jj or using-jj" >&2
            ls -la
            exit 1
          fi
          echo "Archive layout:"
          unzip -l "dist/${SAFE}.zip" | head -20
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          files: dist/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Tag pushes mark latest; manual backfills of older tags should not.
          make_latest: ${{ github.event_name == 'push' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
